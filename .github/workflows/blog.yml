name: Latest Blog Posts

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.sourav.com.bd/feeds/posts/default"
          max_post_count: 5
          template: "$newline- 🔗 [$title]($url)"
