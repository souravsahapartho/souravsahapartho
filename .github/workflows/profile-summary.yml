name: Generate Language Stats Card

on:
  schedule:
    - cron: '0 */6 * * *'   # প্রতি ৬ ঘণ্টা পর পর auto-update
  workflow_dispatch:         # চাইলে manually "Run workflow" থেকেও চালানো যাবে

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: souravsahapartho
          UTC_OFFSET: 6
